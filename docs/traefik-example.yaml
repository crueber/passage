# Passage forward-auth example for Traefik
#
# This configuration gates access to downstream services using Passage's
# forwardAuth middleware. Every request first hits /auth/traefik; if Passage
# returns 200 the identity headers are forwarded and the request proceeds,
# otherwise Traefik returns the Passage 401 response.
#
# Replace "passage:8080" with the actual address of your Passage instance.

http:
  middlewares:
    passage-auth:
      forwardAuth:
        address: "http://passage:8080/auth/traefik"
        authResponseHeaders:
          - "X-Passage-Username"
          - "X-Passage-Email"
          - "X-Passage-Name"
          - "X-Passage-User-ID"
          - "X-Passage-Is-Admin"
        trustForwardHeader: true

  routers:
    my-app:
      rule: "Host(`myapp.home.example.com`)"
      middlewares:
        - passage-auth
      service: my-app-service

  services:
    my-app-service:
      loadBalancer:
        servers:
          - url: "http://my-app-container:8080"
