{{define "admin-header"}}
<nav class="navbar passage-navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <a class="navbar-item has-text-weight-bold passage-admin-brand" href="/admin" aria-label="Passage Admin home">
      passage<span class="has-text-grey-light mx-1" aria-hidden="true">/</span>admin
    </a>
    <a role="button" class="navbar-burger" aria-label="menu" aria-expanded="false"
       data-target="admin-navbar-menu">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </a>
  </div>
  <div id="admin-navbar-menu" class="navbar-menu">
    <div class="navbar-end">
      <a class="navbar-item" href="/logout">Sign out</a>
    </div>
  </div>
</nav>
<script>
  (function(){
    var burger = document.querySelector('.navbar-burger[data-target="admin-navbar-menu"]');
    if (!burger) return;
    burger.addEventListener('click', function(){
      var target = document.getElementById(burger.dataset.target);
      var active = burger.classList.toggle('is-active');
      target.classList.toggle('is-active', active);
      burger.setAttribute('aria-expanded', String(active));
    });
  }());
</script>
{{end}}

{{define "admin-nav"}}
<aside class="passage-admin-sidebar menu" aria-label="Admin navigation">
  <p class="menu-label">Navigation</p>
  <ul class="menu-list">
    <li><a href="/admin"          {{if eq .ActiveNav "dashboard"}}class="is-active"{{end}}>Dashboard</a></li>
    <li><a href="/admin/users"    {{if eq .ActiveNav "users"}}class="is-active"{{end}}>Users</a></li>
    <li><a href="/admin/apps"     {{if eq .ActiveNav "apps"}}class="is-active"{{end}}>Apps</a></li>
    <li><a href="/admin/sessions" {{if eq .ActiveNav "sessions"}}class="is-active"{{end}}>Sessions</a></li>
    <li><a href="/admin/settings" {{if eq .ActiveNav "settings"}}class="is-active"{{end}}>Settings</a></li>
  </ul>
</aside>
{{end}}

{{define "admin-flash"}}
{{if .Flash}}
<div role="alert" class="notification {{if eq .Flash.Type "error"}}is-danger{{else if eq .Flash.Type "success"}}is-success{{else}}is-info{{end}} is-light mb-4">
  {{.Flash.Message}}
</div>
{{end}}
{{end}}
