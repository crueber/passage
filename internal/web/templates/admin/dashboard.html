{{define "admin-dashboard"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Passage Admin</title>
  <link rel="stylesheet" href="/static/bulma.min.css">
  <link rel="stylesheet" href="/static/passage.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
{{template "admin-header" .}}
<div class="container is-widescreen">
  <div class="columns is-gapless">
    {{template "admin-nav" .}}
    <main class="column passage-admin-content">
      {{template "admin-flash" .}}
      <h1 class="title is-4">Dashboard</h1>
      <div class="columns">
        <div class="column is-narrow">
          <div class="box passage-stat">
            <p class="passage-stat-number">{{.UserCount}}</p>
            <p class="passage-stat-label">Users</p>
          </div>
        </div>
        <div class="column is-narrow">
          <div class="box passage-stat">
            <p class="passage-stat-number">{{.AppCount}}</p>
            <p class="passage-stat-label">Apps</p>
          </div>
        </div>
        <div class="column is-narrow">
          <div class="box passage-stat">
            <p class="passage-stat-number">{{.SessionCount}}</p>
            <p class="passage-stat-label">Active Sessions</p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
{{end}}
