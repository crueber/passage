{{define "magic_link_request.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with magic link — Passage</title>
  <link rel="stylesheet" href="/static/bulma.min.css">
  <link rel="stylesheet" href="/static/passage.css">
</head>
<body>
<section class="hero is-fullheight">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-narrow">
          <p class="passage-wordmark">passage</p>

          {{if .Flash}}
          <div role="alert" class="notification {{if eq .Flash.Type "error"}}is-danger{{else if eq .Flash.Type "success"}}is-success{{else}}is-info{{end}} is-light">
            {{.Flash.Message}}
          </div>
          {{end}}

          <div class="card" style="min-width:22rem;max-width:26rem;">
            <div class="card-content">
              <h1 class="title is-5">Sign in with a magic link</h1>
              <p class="mb-4">Enter your email address and we'll send you a one-time sign-in link.</p>

              <form method="POST" action="/login/magic">
                <input type="hidden" name="rd" value="{{.RedirectTo}}">
                {{csrfField .CSRFToken}}

                <div class="field">
                  <label class="label" for="email">Email address</label>
                  <div class="control">
                    <input class="input" type="email" id="email" name="email"
                           autocomplete="email" required autofocus value="{{.Email}}">
                  </div>
                </div>

                <div class="field">
                  <div class="control">
                    <button type="submit" class="button is-primary is-fullwidth">Send sign-in link</button>
                  </div>
                </div>
              </form>

              <div class="has-text-centered mt-4 is-size-7">
                <a href="/login">Back to sign in</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
{{end}}
