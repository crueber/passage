{{define "setup.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Initial Setup — Passage</title>
  <link rel="stylesheet" href="/static/simple.min.css">
  <link rel="stylesheet" href="/static/passage.css">
</head>
<body>
  <main>
    <h1 class="wordmark">passage</h1>
    {{if .Flash}}
    <div role="alert" class="flash flash-{{.Flash.Type}}">{{.Flash.Message}}</div>
    {{end}}
    <h2>Initial Setup</h2>
    <p>No admin account exists yet. Enter the setup token printed in the server logs to create the first admin account.</p>
    <form method="POST" action="/setup">
      <label for="setup_token">Setup Token</label>
      <input type="text" id="setup_token" name="setup_token"
             autocomplete="off" required autofocus
             aria-describedby="setup_token_hint">
      <small id="setup_token_hint">Copy this from the server startup logs.</small>

      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             autocomplete="username" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email"
             autocomplete="email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="new-password" required minlength="8">

      <label for="password_confirm">Confirm Password</label>
      <input type="password" id="password_confirm" name="password_confirm"
             autocomplete="new-password" required minlength="8">

      <button type="submit">Create Admin Account</button>
    </form>
  </main>
</body>
</html>
{{end}}
