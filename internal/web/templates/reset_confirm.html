{{define "reset_confirm.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose a new password — Passage</title>
  <link rel="stylesheet" href="/static/bulma.min.css">
  <link rel="stylesheet" href="/static/passage.css">
</head>
<body>
<section class="hero is-fullheight">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-narrow">
          <p class="passage-wordmark">passage</p>

          {{if .Flash}}
          <div role="alert" class="notification {{if eq .Flash.Type "error"}}is-danger{{else if eq .Flash.Type "success"}}is-success{{else}}is-info{{end}} is-light">
            {{.Flash.Message}}
          </div>
          {{end}}

          <div class="card" style="min-width:22rem;max-width:26rem;">
            <div class="card-content">
              <h1 class="title is-5">Choose a new password</h1>

              <form method="POST" action="/reset/{{.Token}}">
                <div class="field">
                  <label class="label" for="password">New password</label>
                  <div class="control">
                    <input class="input" type="password" id="password" name="password"
                           autocomplete="new-password" required autofocus minlength="8">
                  </div>
                </div>

                <div class="field">
                  <label class="label" for="password_confirm">Confirm new password</label>
                  <div class="control">
                    <input class="input" type="password" id="password_confirm" name="password_confirm"
                           autocomplete="new-password" required minlength="8">
                  </div>
                </div>

                <div class="field">
                  <div class="control">
                    <button type="submit" class="button is-primary is-fullwidth">Set new password</button>
                  </div>
                </div>
              </form>

              <div class="has-text-centered mt-4 is-size-7">
                <a href="/login">Back to sign in</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
{{end}}
