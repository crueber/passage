{{define "register.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Passage</title>
  <link rel="stylesheet" href="/static/simple.min.css">
  <link rel="stylesheet" href="/static/passage.css">
</head>
<body>
  <main>
    <h1 class="wordmark">passage</h1>
    {{if .Flash}}
    <div role="alert" class="flash flash-{{.Flash.Type}}">{{.Flash.Message}}</div>
    {{end}}
    <h2>Create an account</h2>
    <form method="POST" action="/register">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             required autofocus value="{{.Username}}">

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" autocomplete="email"
             required value="{{.Email}}">

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="new-password" required minlength="8">

      <button type="submit">Create account</button>
    </form>
    <p><a href="/login">Already have an account? Sign in</a></p>
  </main>
</body>
</html>
{{end}}
