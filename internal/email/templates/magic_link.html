Subject: Your Passage sign-in link

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px">
  {{if .Name}}<p>Hi {{.Name}},</p>{{end}}
  <p>Here is your Passage sign-in link. It can only be used once and expires shortly.</p>
  <p style="margin:32px 0">
    <a href="{{.MagicURL}}"
       style="background:#4f46e5;color:#fff;padding:12px 24px;text-decoration:none;border-radius:4px;display:inline-block">
      Sign in to Passage
    </a>
  </p>
  <p style="font-size:12px;color:#6b7280">
    Or copy this link: <a href="{{.MagicURL}}">{{.MagicURL}}</a>
  </p>
  <p style="font-size:12px;color:#6b7280">
    If you did not request this link, you can safely ignore this email.
  </p>
</body>
</html>
